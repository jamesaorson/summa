name: Check code quality

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-format

      - name: Check versions
        run: |
          clang-format --version

      - name: Check C code
        run: |
          make check/c

      - name: Check Markdown
        run: |
          make check/markdown
