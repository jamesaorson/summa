name: Check code quality

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-format

      - name: Format sources
        run: |
          make format

      - name: Check for changes
        run: git diff --exit-code
