name: Check code quality

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Install clang-format
        env:
          # Keep in sync with the major version Homebrew's `clang-format`
          # formula installs locally (see `make setup/tools`) — Ubuntu's apt
          # repos lag behind and format wrapped macro continuations
          # differently across major versions, which silently breaks `make
          # check/c` for anyone on a newer local clang-format.
          CLANG_FORMAT_MAJOR_VERSION: 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$CLANG_FORMAT_MAJOR_VERSION"
          sudo ln -sf "/usr/bin/clang-format-$CLANG_FORMAT_MAJOR_VERSION" /usr/local/bin/clang-format
          echo "clang-format version: $(clang-format --version)"

      - name: Check versions
        run: |
          clang-format --version
          gcc --version

      - name: Check C code
        run: |
          make check/c

      - name: Check Markdown
        run: |
          make check/markdown
